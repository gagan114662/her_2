name: Deploy Mathematricks Stripe Worker

on:
  pull_request:
    paths:
      - ".github/workflows/deploy-mathematricks-stripe-worker.yml"
      - "integrations/mathematricks-stripe-worker/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-mathematricks-stripe-worker.yml"
      - "integrations/mathematricks-stripe-worker/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mathematricks-stripe-worker
  cancel-in-progress: false

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrations/mathematricks-stripe-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: integrations/mathematricks-stripe-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  deploy:
    if: github.event_name != 'pull_request'
    needs: typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrations/mathematricks-stripe-worker
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: integrations/mathematricks-stripe-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply mathematricks_stripe_events --remote
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
